name: Build ImmortalWrt

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: 更新并下载 feeds
        working-directory: openWRT
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 清理构建缓存 (Clean build cache before compilation)
        working-directory: openWRT
        run: |
          echo "Cleaning build directories..."
          rm -rf build_dir/target-*/host
          rm -rf staging_dir/hostpkg
          make distclean || true

      - name: 更新并重新下载 feeds (Update feeds again to ensure completeness)
        working-directory: openWRT
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install -a

      - name: 使用ssh连接编译环境
        run: |
          echo "Connecting to the build environment..."
          # Your connection logic here
